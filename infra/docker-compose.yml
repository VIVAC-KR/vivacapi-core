services:
  api:
    image: vivacadmin/vivacapi-core:latest
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    networks:
      - vivac-network
    logging:
      driver: awslogs
      options:
        awslogs-region: ap-northeast-2
        awslogs-group: /vivac/api
        awslogs-stream: fastapi
        awslogs-create-group: "true"

networks:
  vivac-network:
    external: true
