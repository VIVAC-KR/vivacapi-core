{% extends "sqladmin_original/base.html" %}
{% block body %}
<div class="d-flex align-items-center justify-content-center vh-100">
  <div class="col-lg-5 col-md-6 card card-md">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Login to {{ admin.title }}</h2>
      <p class="text-secondary text-center mb-4">Sign in with your Google account.<br>Staff access only.</p>

      <form id="admin-login-form" action="{{ url_for('admin:login') }}" method="POST">
        <input type="hidden" name="id_token" id="id_token_input" />
      </form>

      <div id="g_id_onload"
        data-client_id="{{ google_client_id }}"
        data-callback="onGoogleSignIn"
        data-auto_prompt="false">
      </div>
      <div class="d-flex justify-content-center">
        <div class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="outline"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left">
        </div>
      </div>

      {% if error %}
      <div class="alert alert-danger mt-4 mb-0" role="alert">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  function onGoogleSignIn(response) {
    document.getElementById("id_token_input").value = response.credential;
    document.getElementById("admin-login-form").submit();
  }
</script>
{% endblock %}
