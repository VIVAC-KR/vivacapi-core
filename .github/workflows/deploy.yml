name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write

    env:
      IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      IMAGE: ${{ vars.DOCKER_IMAGE }}:${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      IMAGE_LATEST: ${{ vars.DOCKER_IMAGE }}:latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod
    permissions:
      id-token: write
      contents: write

    env:
      IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      IMAGE: ${{ vars.DOCKER_IMAGE }}:${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Copy infra files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "infra/docker-compose.yml"
          target: "/home/ec2-user/vivac"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ec2-user/vivac

            IMAGE="${{ env.IMAGE }}"
            # compose가 latest가 아닌, 마이그레이션에 사용한 것과 동일한
            # 버전 태그 이미지를 띄우도록 고정한다 (롤백 시에도 태그만 지정).
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"

            echo "[1/4] Pull image: $IMAGE"
            docker pull "$IMAGE"

            echo "[2/4] Run migrations"
            docker run --rm --env-file .env "$IMAGE" alembic upgrade head

            echo "[3/4] Deploy"
            docker compose pull
            docker compose up -d

            echo "[4/4] Health check (max 60s)"
            for i in $(seq 1 12); do
              if curl -fsS "http://localhost:8000/health" > /dev/null; then
                echo "Healthy after attempt $i"
                break
              fi
              if [ "$i" = "12" ]; then
                echo "Health check FAILED after 60s. Recent container logs:"
                docker logs --tail 100 "$(docker compose ps -q api)" || true
                exit 1
              fi
              sleep 5
            done

            docker image prune -f || true

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
